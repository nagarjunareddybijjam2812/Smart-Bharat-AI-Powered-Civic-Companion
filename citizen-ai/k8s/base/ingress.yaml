apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citizen-ai-ingress
  namespace: citizen-ai
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - citizen-ai.gov.in
    - api.citizen-ai.gov.in
    - admin.citizen-ai.gov.in
    secretName: citizen-ai-tls
  rules:
  - host: citizen-ai.gov.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: citizen-ai-web
            port:
              number: 80
  - host: api.citizen-ai.gov.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: citizen-ai-api
            port:
              number: 80
